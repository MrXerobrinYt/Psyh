<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Устав психиатрической службы | Больница штата North</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js" class="particles-bg"></div>
    <div class="gradient-overlay"></div>

    <!-- Красивый оверлей ввода ника -->
    <div id="nickOverlay" class="login-overlay" style="display: flex;">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-brain"></i>
                <span>Устав психиатрической службы</span>
                <div class="header-badge">North</div>
            </div>
            <div class="login-body">
                <h2>Представьтесь</h2>
                <p>Введите ваш ник – он будет виден администраторам</p>
                <div class="input-group">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" id="readerNick" placeholder="Ваш ник / позывной" autocomplete="off">
                </div>
                <button id="enterBtn" class="login-btn">
                    <span>Войти как читатель</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <div class="login-footer">
                <i class="fas fa-shield-alt"></i>
                <span>Конфиденциальность: ник не передаётся третьим лицам</span>
            </div>
        </div>
    </div>

    <!-- Основной контент (скрыт до ввода ника) -->
    <div class="app" id="mainContent" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-balance-scale"></i>
                <span>Устав психиатрической службы</span>
                <span class="badge-state">North</span>
            </div>
            <div class="sidebar-nav">
                <div class="nav-title"><i class="fas fa-filter"></i> Разделы устава</div>
                <div class="category-filter" id="categoryFilter">
                    <button class="filter-btn active" data-category="all">Все главы</button>
                    <button class="filter-btn" data-category="Общие положения">Общие положения</button>
                    <button class="filter-btn" data-category="Пациент">Пациент</button>
                    <button class="filter-btn" data-category="Палата особо буйных">Палата особо буйных</button>
                    <button class="filter-btn" data-category="Документация и отчеты">Документация и отчеты</button>
                    <button class="filter-btn" data-category="Дисциплина и субординация">Дисциплина и субординация</button>
                </div>
                <div class="nav-title" style="margin-top: 24px;"><i class="fas fa-book"></i> Оглавление</div>
                <ul class="chapter-list" id="chapterList"></ul>
            </div>
            <div class="sidebar-footer">
                <a href="admin.html" class="admin-link"><i class="fas fa-lock"></i> Управление уставом</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="reader">
                <div class="reader-header">
                    <h1 id="displayTitle"><i class="fas fa-gavel"></i> <span>Загрузка...</span></h1>
                </div>
                <div class="reader-body" id="displayContent">
                    <div class="skeleton"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="js/reader-tracker.js"></script>
    <script src="js/particles-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/script.js"></script>
    <script>
        const nickOverlay = document.getElementById('nickOverlay');
        const mainContent = document.getElementById('mainContent');
        const nickInput = document.getElementById('readerNick');
        const enterBtn = document.getElementById('enterBtn');

        function startSession() {
            const nick = nickInput.value.trim();
            if (!nick) {
                // Визуальная подсказка об ошибке
                nickInput.style.borderColor = '#ef4444';
                setTimeout(() => nickInput.style.borderColor = '', 1500);
                return;
            }
            localStorage.setItem('reader_nick', nick);
            if (window.setReaderNick && typeof window.setReaderNick === 'function') {
                window.setReaderNick(nick);
            }
            // Плавное исчезновение оверлея
            nickOverlay.style.opacity = '0';
            setTimeout(() => {
                nickOverlay.style.display = 'none';
                mainContent.style.display = 'flex';
                if (typeof loadChapters === 'function') loadChapters();
            }, 300);
        }

        const savedNick = localStorage.getItem('reader_nick');
        if (savedNick) {
            nickInput.value = savedNick;
            startSession();
        } else {
            // Плавное появление оверлея
            nickOverlay.style.opacity = '1';
        }

        enterBtn.addEventListener('click', startSession);
        nickInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') startSession(); });
        nickInput.addEventListener('input', () => nickInput.style.borderColor = '');
    </script>
</body>
</html>
