<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Устав психиатрической службы | Больница штата North</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        /* Гарантия стилей оверлея (на случай, если style.css не загрузится) */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 15, 0.98);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(18, 18, 30, 0.95);
            border-radius: 40px;
            width: 440px;
            max-width: 90%;
            border: 1px solid rgba(124,58,237,0.4);
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.1));
            padding: 32px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            position: relative;
        }
        .login-header .header-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(124,58,237,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #c4b5fd;
        }
        .login-body { padding: 40px; }
        .login-body h2 { font-size: 24px; margin-bottom: 8px; }
        .login-body p { color: #9ca3af; font-size: 14px; margin-bottom: 28px; }
        .input-group { position: relative; margin-bottom: 24px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 18px; }
        .input-group input {
            width: 100%;
            padding: 16px 18px 16px 52px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 20px;
            color: #f3f4f6;
            font-size: 15px;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(0,0,0,0.6);
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124,58,237,0.5);
        }
        .login-footer {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-footer i { color: #10b981; }
    </style>
</head>
<body>
    <div id="particles-js" class="particles-bg"></div>
    <div class="gradient-overlay"></div>

    <!-- Оверлей ввода ника -->
    <div id="nickOverlay" class="login-overlay" style="display: flex;">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-brain"></i>
                <span>Устав психиатрической службы</span>
                <div class="header-badge">North</div>
            </div>
            <div class="login-body">
                <h2>Представьтесь</h2>
                <p>Введите ваш ник – он будет виден администраторам</p>
                <div class="input-group">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" id="readerNick" placeholder="Ваш ник / позывной" autocomplete="off">
                </div>
                <button id="enterBtn" class="login-btn">
                    <span>Войти как читатель</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <div class="login-footer">
                <i class="fas fa-shield-alt"></i>
                <span>Конфиденциальность: ник не передаётся третьим лицам</span>
            </div>
        </div>
    </div>

    <!-- Основной контент (скрыт до ввода ника) -->
    <div class="app" id="mainContent" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-brand"><i class="fas fa-balance-scale"></i><span>Устав психиатрической службы</span><span class="badge-state">North</span></div>
            <div class="sidebar-nav">
                <div class="nav-title"><i class="fas fa-filter"></i> Разделы устава</div>
                <div class="category-filter" id="categoryFilter">
                    <button class="filter-btn active" data-category="all">Все главы</button>
                    <button class="filter-btn" data-category="УСТАВ">УСТАВ</button>
                </div>
                <div class="nav-title" style="margin-top: 24px;"><i class="fas fa-book"></i> Оглавление</div>
                <ul class="chapter-list" id="chapterList"></ul>
            </div>
            <div class="sidebar-footer"><a href="admin.html" class="admin-link"><i class="fas fa-lock"></i> Управление уставом</a></div>
        </aside>
        <main class="main-content">
            <div class="reader">
                <div class="reader-header"><h1 id="displayTitle"><i class="fas fa-gavel"></i> <span>Загрузка...</span></h1></div>
                <div class="reader-body" id="displayContent"><div class="skeleton"></div></div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK и инициализация -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB6sLxlDP40r3H5i6zTFFvf_AzX6IVU4H8",
            authDomain: "rpm-psihiatrie-north.firebaseapp.com",
            databaseURL: "https://rpm-psihiatrie-north-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rpm-psihiatrie-north",
            storageBucket: "rpm-psihiatrie-north.firebasestorage.app",
            messagingSenderId: "563535287717",
            appId: "1:563535287717:web:839c60f821591f12b6444c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        window.firebaseDb = firebase.database();
    </script>

    <script src="js/reader-tracker.js"></script>
    <script src="js/particles-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/script.js"></script>

    <script>
        const nickOverlay = document.getElementById('nickOverlay');
        const mainContent = document.getElementById('mainContent');
        const nickInput = document.getElementById('readerNick');
        const enterBtn = document.getElementById('enterBtn');

        function forceUpdateChapter() {
            if (typeof window.updateCurrentChapter === 'function') window.updateCurrentChapter();
            else setTimeout(forceUpdateChapter, 500);
        }
        function startSession() {
            const nick = nickInput.value.trim();
            if (!nick) {
                nickInput.style.borderColor = '#ef4444';
                setTimeout(() => nickInput.style.borderColor = '', 1500);
                return;
            }
            localStorage.setItem('reader_nick', nick);
            if (window.setReaderNick) {
                window.setReaderNick(nick, () => {
                    if (typeof loadChapters === 'function') loadChapters().then(() => forceUpdateChapter());
                    else forceUpdateChapter();
                });
            }
            nickOverlay.style.opacity = '0';
            setTimeout(() => {
                nickOverlay.style.display = 'none';
                mainContent.style.display = 'flex';
            }, 300);
        }
        const savedNick = localStorage.getItem('reader_nick');
        if (savedNick) {
            nickInput.value = savedNick;
            startSession();
        } else {
            nickOverlay.style.opacity = '1';
        }
        enterBtn.addEventListener('click', startSession);
        nickInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') startSession(); });
        nickInput.addEventListener('input', () => nickInput.style.borderColor = '');
    </script>
</body>
</html>
